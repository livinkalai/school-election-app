{% extends "base.html" %}

{% block content %}
<style>
  body.full-background {
    background-image: none !important;
    background-color: #004e7f !important;
  }
  .watermark-logo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
    opacity: 0.12;
    z-index: 0;
    pointer-events: none;
    display: block;
    margin: 0 auto;
    right: 0;
    bottom: 0;
    background: #004e7f;
  }
  .container, .row, .col-12, .col-md-4, .card, .card-body {
    position: relative;
    z-index: 1;
  }
  .btn-vote {
    background-color: #28a745 !important;
    color: #fff !important;
    border: none;
    font-weight: bold;
    box-shadow: 0 2px 6px rgba(40,167,69,0.15);
    transition: background 0.2s;
  }
  .btn-vote:hover, .btn-vote:focus {
    background-color: #218838 !important;
    color: #fff !important;
  }
  .voted-label {
    display: inline-block;
    background: #dc3545;
    color: #fff;
    font-weight: bold;
    padding: 0.4em 1.2em;
    border-radius: 1.5em;
    margin-top: 0.5em;
    font-size: 1.1em;
    box-shadow: 0 2px 6px rgba(220,53,69,0.15);
  }
</style>
<img src="{{ logo_url }}" alt="Logo" class="watermark-logo" />
<div class="row">
    <div class="col-12">
        <h2 class="mb-4 text-white text-shadow fw-bold">{{ post.replace('_', ' ').title() }}</h2>
        <!-- <p class="lead text-white text-shadow">Select your candidate:</p> -->
    </div>
</div>

<div class="row">
    {% for candidate in candidates %}
    <div class="col-md-4 mb-4">
        <div class="card candidate-card bg-transparent border-0">
            <img src="{{ candidate_images[candidate] }}" 
                 class="card-img-top candidate-image mx-auto mt-3" 
                 alt="{{ candidate }}"
                 onerror="this.src='/static/images/contact.png'">
            <div class="card-body text-center">
                <h5 class="card-title text-white text-shadow">{{ candidate }}</h5>
                <form method="POST" action="/vote/{{ post }}">
                    <input type="hidden" name="candidate" value="{{ candidate }}">
                    <button type="submit" class="btn btn-vote">Vote</button>
                </form>
            </div>
        </div>
    </div>
    {% endfor %}
</div>

<div class="row mt-4">
    <div class="col-12 text-center">
        <a href="/posts" class="btn btn-light">Back to Posts</a>
    </div>
</div>
{% endblock %}
